<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffffff, #657cff);
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #000000;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #BBE0EF;
        }

        button {
            padding: 10px 20px;
            background: #F16D34;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-left: 4px solid #F16D34;
            margin-bottom: 6px;
            background: #f9f9f9;
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
        }

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br><br>

                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = "c499b663bcbf788ec7a58c3c48f2b0bc";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

        /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory"));

            if (!history) {
                history = [];
            }

            history.push(city);

            localStorage.setItem("weatherHistory", JSON.stringify(history));
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            let history = JSON.parse(localStorage.getItem("weatherHistory"));

            if (!history) {
                history = [];
            }

            historyBox.innerHTML = "";

            history.forEach((city, index) => {
                let wrapper = document.createElement("div");
                wrapper.style.display = "inline-block";
                wrapper.style.margin = "5px";

                let btn = document.createElement("button");
                btn.innerText = city;

                btn.onclick = function () {
                    search(city);
                };

                let removeBtn = document.createElement("span");
                removeBtn.innerText = " ❌";
                removeBtn.style.cursor = "pointer";

                removeBtn.onclick = function () {
                    removeHistory(index);
                };

                wrapper.appendChild(btn);
                wrapper.appendChild(removeBtn);
                historyBox.appendChild(wrapper);

                removeBtn.innerHTML = "&times;";
                removeBtn.style.color = "red";
                removeBtn.style.fontWeight = "bold";
            });
        }

        function removeHistory(index) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            history.splice(index, 1);

            localStorage.setItem("weatherHistory", JSON.stringify(history));

            showHistory();
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
                showHistory();

            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });

        /* ---------- INITIAL LOAD ---------- */
        showHistory();  
    </script>

</body>

</html>
